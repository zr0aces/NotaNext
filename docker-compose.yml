services:
  pimnext:
    # Default: pulls the pre-built image from GitHub Container Registry.
    # To build locally instead, run: docker compose up -d --build
    image: ${DOCKER_IMAGE:-ghcr.io/zr0aces/pimnext:1.1.0}
    build:
      context: .
      args:
        VERSION: "1.1.0"
    container_name: pimnext
    restart: always
    environment:
      - CUPS_SERVER=cups
      - PRINTER_NAME=Canon_LBP7110Cw
      - TZ=Asia/Bangkok
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    # Prevent unbounded log growth on long-running hosts (e.g. Raspberry Pi SD card)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
